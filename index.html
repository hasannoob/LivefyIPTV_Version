<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Livefy IP TV - TV & PC Mode</title>
<link rel="icon" href="https://i.ibb.co/3k5p1t4/live-icon.png">
<link rel="stylesheet" href="https://cdn.plyr.io/3.7.8/plyr.css" />
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

<style>
:root {
    --bg: #050505; --card: #1a1a1a; --accent: #00E5FF; --text: #fff;
    --border-color: #333;
}
* { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
body { background: var(--bg); color: var(--text); height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

/* Header */
.app-header { background: #000; padding: 10px; text-align: center; border-bottom: 1px solid var(--border-color); }
.app-header h1 { font-size: 1.5rem; color: var(--accent); letter-spacing: 2px; }

/* Main Container */
.main-container { display: flex; flex: 1; overflow: hidden; }

/* Player Section */
.player-section { flex: 7; background: #000; display: flex; flex-direction: column; position: relative; }
.player-wrap { width: 100%; aspect-ratio: 16/9; background: #000; }
.now-playing { padding: 15px; background: #0a0a0a; display: flex; align-items: center; gap: 10px; border-top: 1px solid var(--border-color); }
#current-ch-name { font-size: 1.2rem; color: var(--accent); font-weight: bold; }

/* Sidebar */
.sidebar { flex: 3; display: flex; flex-direction: column; border-left: 1px solid var(--border-color); background: #0a0a0a; }
.controls-panel { padding: 10px; display: flex; flex-direction: column; gap: 10px; }
select, #searchInput { width: 100%; padding: 12px; background: #1a1a1a; border: 1px solid #333; color: #fff; border-radius: 5px; outline: none; }

.list { flex: 1; overflow-y: auto; padding: 10px; }
.category-title { font-size: 0.9rem; color: var(--accent); padding: 10px 0; border-bottom: 1px solid #222; margin-top: 10px; text-transform: uppercase; }

.row { 
    display: flex; align-items: center; gap: 15px; background: var(--card); padding: 10px; 
    border-radius: 8px; margin-bottom: 8px; cursor: pointer; border: 2px solid transparent; transition: 0.2s;
}
.row:focus, .row:hover { border-color: var(--accent); background: #252525; outline: none; }
.row.active { background: rgba(0, 229, 255, 0.2); border-left: 5px solid var(--accent); }

.list-logo { width: 45px; height: 45px; border-radius: 5px; object-fit: contain; background: #000; }
.name { flex: 1; font-size: 0.95rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

/* Loader */
#loader { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; background: rgba(0,0,0,0.8); z-index: 100; color: white; flex-direction: column; gap: 10px; }
.spinner { width: 40px; height: 40px; border: 4px solid #333; border-top-color: var(--accent); border-radius: 50%; animation: spin 1s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }

@media (max-width: 800px) {
    .main-container { flex-direction: column; }
    .sidebar { flex: none; height: 50vh; border-left: none; }
}
</style>
</head>
<body>

<div class="app-header"><h1>LIVEFY IP TV</h1></div>

<div class="main-container">
    <div class="player-section">
        <div id="loader">
            <div class="spinner"></div>
            <p id="loader-text">প্লেলিস্ট লোড হচ্ছে...</p>
        </div>
        <div class="player-wrap">
            <video id="video" playsinline crossorigin="anonymous"></video>
        </div>
        <div class="now-playing">
            <i class="fas fa-play-circle"></i>
            <span id="current-ch-name">চ্যানেল নির্বাচন করুন</span>
        </div>
    </div>

    <div class="sidebar">
        <div class="controls-panel">
            <select id="categorySelect"><option value="_all_">সব ক্যাটাগরি</option></select>
            <input type="text" id="searchInput" placeholder="চ্যানেল খুঁজুন..." onkeyup="render()">
        </div>
        <div class="list" id="list"></div>
    </div>
</div>

<script src="https://cdn.plyr.io/3.7.8/plyr.js"></script>
<script>
const video = document.getElementById('video');
const loader = document.getElementById('loader');
const loaderText = document.getElementById('loader-text');
const listArea = document.getElementById('list');
const categorySelect = document.getElementById('categorySelect');
const chNameDisplay = document.getElementById('current-ch-name');
const searchInput = document.getElementById('searchInput');

let hls = new Hls();
let player;
let allChannels = [];
let categorizedChannels = {};

const playlists = [
    "https://raw.githubusercontent.com/sm-monirulislam/RoarZone-Auto-Update-playlist/refs/heads/main/RoarZone.m3u",
    "https://raw.githubusercontent.com/sm-monirulislam/SM-Live-TV/refs/heads/main/Bangla%20Channel.m3u"
];

document.addEventListener('DOMContentLoaded', () => {
    player = new Plyr(video, { controls: ['play-large', 'play', 'progress', 'current-time', 'mute', 'volume', 'settings', 'fullscreen'] });
    loadPlaylists();
    setupRemoteControl();
});

async function loadPlaylists() {
    loader.style.display = 'flex';
    allChannels = [];
    categorizedChannels = {};

    for (let url of playlists) {
        try {
            const response = await fetch(url);
            if (!response.ok) throw new Error("Fetch failed");
            const data = await response.text();
            parseM3U(data);
        } catch (err) {
            console.error("Error loading playlist:", url);
        }
    }

    if (allChannels.length === 0) {
        loaderText.innerText = "চ্যানেল পাওয়া যায়নি! লিঙ্ক চেক করুন।";
        return;
    }

    populateCategories();
    render();
    loader.style.display = 'none';
}

function parseM3U(data) {
    const lines = data.split(/\r?\n/);
    let currentCh = null;

    lines.forEach(line => {
        line = line.trim();
        if (line.startsWith('#EXTINF:')) {
            const name = line.split(',')[1] || "Unknown Channel";
            const logo = line.match(/tvg-logo="([^"]*)"/)?.[1] || "";
            const group = line.match(/group-title="([^"]*)"/)?.[1] || "Others";
            currentCh = { name, logo, group };
        } else if (line.startsWith('http')) {
            if (currentCh) {
                currentCh.url = line;
                allChannels.push(currentCh);
                if (!categorizedChannels[currentCh.group]) categorizedChannels[currentCh.group] = [];
                categorizedChannels[currentCh.group].push(currentCh);
                currentCh = null;
            }
        }
    });
}

function populateCategories() {
    const groups = Object.keys(categorizedChannels).sort();
    groups.forEach(group => {
        const opt = document.createElement('option');
        opt.value = group;
        opt.innerText = group;
        categorySelect.appendChild(opt);
    });
    categorySelect.onchange = render;
}

function render() {
    listArea.innerHTML = "";
    const query = searchInput.value.toLowerCase();
    const selectedGroup = categorySelect.value;

    const groupsToDisplay = selectedGroup === "_all_" ? Object.keys(categorizedChannels).sort() : [selectedGroup];

    groupsToDisplay.forEach(group => {
        const channels = categorizedChannels[group].filter(ch => ch.name.toLowerCase().includes(query));
        if (channels.length > 0) {
            const title = document.createElement('div');
            title.className = 'category-title';
            title.innerText = group;
            listArea.appendChild(title);

            channels.forEach(ch => {
                const div = document.createElement('div');
                div.className = 'row';
                div.tabIndex = 0;
                div.innerHTML = `
                    <img class="list-logo" src="${ch.logo}" onerror="this.src='https://i.ibb.co/3k5p1t4/live-icon.png'">
                    <div class="name">${ch.name}</div>
                `;
                div.onclick = () => playChannel(ch, div);
                listArea.appendChild(div);
            });
        }
    });
}

function playChannel(ch, element) {
    document.querySelectorAll('.row').forEach(r => r.classList.remove('active'));
    element.classList.add('active');
    chNameDisplay.innerText = ch.name;
    
    loader.style.display = 'flex';
    loaderText.innerText = "লোডিং...";

    if (Hls.isSupported()) {
        hls.destroy();
        hls = new Hls();
        hls.loadSource(ch.url);
        hls.attachMedia(video);
        hls.on(Hls.Events.MANIFEST_PARSED, () => {
            loader.style.display = 'none';
            player.play();
        });
        hls.on(Hls.Events.ERROR, () => {
            setTimeout(() => loader.style.display = 'none', 3000);
        });
    } else {
        video.src = ch.url;
        video.addEventListener('loadedmetadata', () => {
            loader.style.display = 'none';
            video.play();
        });
    }
}

function setupRemoteControl() {
    document.addEventListener('keydown', (e) => {
        const active = document.activeElement;
        if (e.key === 'ArrowDown') {
            const next = active.nextElementSibling;
            if (next && next.classList.contains('row')) next.focus();
        } else if (e.key === 'ArrowUp') {
            const prev = active.previousElementSibling;
            if (prev && prev.classList.contains('row')) prev.focus();
        } else if (e.key === 'Enter') {
            if (active.classList.contains('row')) active.click();
        }
    });
}
</script>

</body>
</html>
